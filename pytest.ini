[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
log_cli = true
log_cli_level = INFO
markers =
    unit: Unit tests (fast, no io)
    integration: Integration tests (slow, db/io)
    slow: Slow tests
    testnet: Exchange testnet tests (requires API keys)
    e2e: Full-stack E2E tests (requires running Docker Compose services)
testpaths = tests
python_files = test_*.py
addopts = -v --tb=short --cov=src --cov-report=term-missing --cov-report=html:htmlcov --cov-fail-under=40
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning

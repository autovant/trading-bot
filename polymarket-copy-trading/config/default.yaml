# Polymarket Copy Trading Bot - Default Configuration
# Override via .env or environment variables

polymarket:
  clob_url: "https://clob.polymarket.com"
  gamma_url: "https://gamma-api.polymarket.com"
  chain_id: 137

# Wallets to monitor and copy trades from
source_wallets: []

# Polling interval in seconds for trade monitoring
poll_interval_seconds: 15

# Copy trading settings
copy:
  # Position sizing mode: "proportional" or "fixed"
  sizing_mode: "proportional"
  # Multiplier for proportional sizing (1.0 = same size as source)
  size_multiplier: 1.0
  # Fixed size in USDC (used when sizing_mode is "fixed")
  fixed_size_usdc: 10.0
  # Whether to copy sells/exits
  copy_sells: true
  # Minimum trade size in USDC
  min_trade_size_usdc: 1.0
  # Maximum delay (seconds) before a detected trade is considered stale
  max_trade_age_seconds: 300

# Risk management
risk:
  # Maximum position size per market in USDC
  max_position_size_usdc: 100.0
  # Maximum total portfolio exposure in USDC
  max_portfolio_exposure_usdc: 500.0
  # Maximum number of open positions
  max_open_positions: 20
  # Slippage tolerance as percentage (e.g., 2.0 = 2%)
  slippage_tolerance_pct: 2.0
  # Maximum price to pay for a share (e.g., 0.95 = 95 cents)
  max_price: 0.95
  # Minimum price (skip very cheap shares)
  min_price: 0.05
  # Daily loss limit in USDC - bot pauses if exceeded
  daily_loss_limit_usdc: 50.0
  # Circuit breaker: max consecutive losses before pausing
  max_consecutive_losses: 5

# Persistence
database:
  url: "sqlite:///data/trades.db"

# Dry run mode (log trades without executing)
dry_run: true

# Logging
logging:
  level: "INFO"
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
